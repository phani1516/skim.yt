name: Skim.yt Daily ETL

on:
  schedule:
    # Runs at 2:00 AM and 2:00 PM UTC every day
    - cron: '0 2,14 * * *'
  workflow_dispatch: # This adds a magical "Run Now" button in GitHub so you can test it manually!

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase google-generativeai google-api-python-client youtube-transcript-api python-dotenv
          
      - name: Run Pipeline
        env: # This injects your secure GitHub secrets into the script
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python skim-backend/pipeline.py